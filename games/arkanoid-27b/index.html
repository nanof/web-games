<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkanoid - HTML5 Clone</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* ===== HEADER / HUD ===== */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 780px;
            padding: 10px 20px;
            background: linear-gradient(180deg, #1a1a3e, #0d0d2b);
            border: 2px solid #3333aa;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
        }

        .hud-item {
            color: #ffffff;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hud-item span {
            color: #ffcc00;
            font-weight: bold;
            font-size: 22px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.7);
        }

        .lives-display {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .life-icon {
            width: 16px;
            height: 8px;
            background: #00ccff;
            border-radius: 4px;
            box-shadow: 0 0 6px rgba(0, 204, 255, 0.7);
        }

        /* ===== CANVAS ===== */
        canvas {
            display: block;
            background: #0d0d2b;
            border: 2px solid #3333aa;
            border-top: none;
            cursor: none;
        }

        /* ===== FOOTER / CONTROLES ===== */
        .footer {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 780px;
            padding: 12px 20px;
            background: linear-gradient(180deg, #0d0d2b, #1a1a3e);
            border: 2px solid #3333aa;
            border-top: none;
            border-radius: 0 0 10px 10px;
        }

        .btn {
            padding: 10px 30px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid #ffcc00;
            background: transparent;
            color: #ffcc00;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #ffcc00;
            color: #0d0d2b;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }

        .controls-info {
            color: #6666aa;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* ===== OVERLAY (Game Over / Win) ===== */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 20, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.active {
            display: flex;
        }

        .overlay-box {
            text-align: center;
            padding: 50px 70px;
            border: 3px solid #ffcc00;
            background: rgba(13, 13, 43, 0.95);
            box-shadow: 0 0 60px rgba(255, 204, 0, 0.2);
        }

        .overlay-box h1 {
            font-size: 48px;
            color: #ffcc00;
            text-shadow: 0 0 30px rgba(255, 204, 0, 0.6);
            margin-bottom: 15px;
        }

        .overlay-box p {
            font-size: 20px;
            color: #aaaadd;
            margin-bottom: 30px;
        }

        .overlay-box .btn {
            padding: 14px 50px;
            font-size: 18px;
        }

        /* ===== TÍTULO ===== */
        .title-bar {
            text-align: center;
            margin-bottom: 5px;
        }

        .title-bar h1 {
            font-size: 36px;
            color: #ffcc00;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.5), 0 0 40px rgba(255, 100, 0, 0.3);
            letter-spacing: 8px;
        }

        .title-bar h1 em {
            color: #ff6600;
            font-style: normal;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="title-bar">
        <h1>ARKAN<em>OID</em></h1>
    </div>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-item">Score: <span id="scoreDisplay">0</span></div>
        <div class="hud-item">Level: <span id="levelDisplay">1</span></div>
        <div class="hud-item">Lives:</div>
        <div class="lives-display" id="livesDisplay"></div>
    </div>

    <!-- CANVAS -->
    <canvas id="gameCanvas" width="780" height="520"></canvas>

    <!-- FOOTER -->
    <div class="footer">
        <button class="btn" id="restartBtn">🔄 Reiniciar</button>
        <button class="btn" id="pauseBtn">⏸ Pausa</button>
    </div>

    <div class="controls-info">
        ← → Flechas o Ratón para mover &nbsp;|&nbsp; ESPACIO para lanzar bola &nbsp;|&nbsp; P para pausar
    </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
    <div class="overlay-box">
        <h1 id="overlayTitle">GAME OVER</h1>
        <p id="overlayMessage">Score Final: 0</p>
        <button class="btn" id="overlayBtn">Jugar de Nuevo</button>
    </div>
</div>

<script>
// ============================================================
//  ARKANOID - HTML5 Canvas Clone (Vanilla JS)
// ============================================================

(function () {
    "use strict";

    // ---- CANVAS & CONTEXT ----
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    // ---- DOM REFS ----
    const scoreDisplay  = document.getElementById("scoreDisplay");
    const levelDisplay  = document.getElementById("levelDisplay");
    const livesDisplay  = document.getElementById("livesDisplay");
    const restartBtn    = document.getElementById("restartBtn");
    const pauseBtn      = document.getElementById("pauseBtn");
    const overlay       = document.getElementById("overlay");
    const overlayTitle  = document.getElementById("overlayTitle");
    const overlayMsg    = document.getElementById("overlayMessage");
    const overlayBtn    = document.getElementById("overlayBtn");

    // ============================================================
    //  AUDIO ENGINE (Web Audio API - no external files)
    // ============================================================
    class SoundEngine {
        constructor() {
            this.ctx = null;
            this.initialized = false;
        }

        init() {
            if (this.initialized) return;
            try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.initialized = true;
            } catch (e) {
                console.warn("Web Audio API not available");
            }
        }

        play(type) {
            if (!this.initialized || !this.ctx) return;
            const ac = this.ctx;
            const now = ac.currentTime;

            switch (type) {
                case "paddle":   this._tone(now, 220, 0.08, "square", 0.15); break;
                case "wall":     this._tone(now, 300, 0.06, "triangle", 0.12); break;
                case "brick":    this._noise(now, 0.1, 0.2); break;
                case "powerup":  this._sweep(now, 400, 900, 0.25, "sine", 0.2); break;
                case "loseLife": this._sweep(now, 500, 100, 0.5, "sawtooth", 0.25); break;
                case "win":      this._melody(now); break;
                case "launch":   this._tone(now, 440, 0.12, "square", 0.18); break;
            }
        }

        _tone(time, freq, dur, type, vol) {
            const ac = this.ctx;
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, time);
            gain.gain.setValueAtTime(vol, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
            osc.connect(gain).connect(ac.destination);
            osc.start(time);
            osc.stop(time + dur);
        }

        _noise(time, dur, vol) {
            const ac = this.ctx;
            const bufferSize = ac.sampleRate * dur;
            const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * vol;
            }
            const source = ac.createBufferSource();
            source.buffer = buffer;

            // Bandpass filter para que suene más como "crack"
            const filter = ac.createBiquadFilter();
            filter.type = "bandpass";
            filter.frequency.value = 1200;
            filter.Q.value = 1.5;

            const gain = ac.createGain();
            gain.gain.setValueAtTime(vol, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + dur);

            source.connect(filter).connect(gain).connect(ac.destination);
            source.start(time);
        }

        _sweep(time, fromFreq, toFreq, dur, type, vol) {
            const ac = this.ctx;
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(fromFreq, time);
            osc.frequency.exponentialRampToValueAtTime(toFreq, time + dur);
            gain.gain.setValueAtTime(vol, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
            osc.connect(gain).connect(ac.destination);
            osc.start(time);
            osc.stop(time + dur);
        }

        _melody(time) {
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                this._tone(time + i * 0.15, freq, 0.2, "sine", 0.15);
            });
        }
    }

    const audio = new SoundEngine();

    // ============================================================
    //  GAME CONSTANTS
    // ============================================================
    const PADDLE_W = 100;
    const PADDLE_H = 14;
    const BALL_R   = 7;
    const BRICK_ROWS = 8;
    const BRICK_COLS = 12;
    const BRICK_W = 58;
    const BRICK_H = 20;
    const BRICK_PAD = 4;
    const BRICK_OFFSET_TOP = 40;
    const BRICK_OFFSET_LEFT = (W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;

    // Colores estilo Arkanoid por fila (de arriba a abajo)
    const ROW_COLORS = [
        "#ff3333", // rojo
        "#ff6600", // naranja
        "#ffcc00", // amarillo
        "#ffff00", // amarillo claro
        "#33cc33", // verde
        "#00cc99", // turquesa
        "#0099ff", // azul
        "#9933ff", // violeta
    ];

    const ROW_POINTS = [80, 70, 60, 50, 40, 30, 20, 10];

    // ============================================================
    //  GAME STATE
    // ============================================================
    let state = {
        score: 0,
        lives: 3,
        level: 1,
        running: false,
        paused: false,
        gameOver: false,
        won: false,
        ballLaunched: false,
        combo: 0,
    };

    let paddle = { x: W / 2 - PADDLE_W / 2, y: H - 35, w: PADDLE_W, h: PADDLE_H };
    let ball   = { x: 0, y: 0, dx: 0, dy: 0, r: BALL_R, speed: 5 };
    let bricks = [];
    let particles = [];
    let powerUps = [];

    // Input
    let keys = {};
    let mouseX = W / 2;

    // ============================================================
    //  BRICK GENERATION
    // ============================================================
    function createBricks() {
        bricks = [];
        for (let r = 0; r < BRICK_ROWS; r++) {
            for (let c = 0; c < BRICK_COLS; c++) {
                let hp = 1;
                // En niveles > 1, algunos ladrillos tienen más vida
                if (state.level >= 2 && Math.random() < 0.3) hp = 2;
                if (state.level >= 3 && Math.random() < 0.15) hp = 3;

                bricks.push({
                    x: BRICK_OFFSET_LEFT + c * (BRICK_W + BRICK_PAD),
                    y: BRICK_OFFSET_TOP + r * (BRICK_H + BRICK_PAD),
                    w: BRICK_W,
                    h: BRICK_H,
                    color: ROW_COLORS[r],
                    points: ROW_POINTS[r],
                    hp: hp,
                    maxHp: hp,
                    alive: true,
                });
            }
        }
    }

    // ============================================================
    //  PARTICLES SYSTEM
    // ============================================================
    function spawnParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 4;
            particles.push({
                x: x,
                y: y,
                dx: Math.cos(angle) * speed,
                dy: Math.sin(angle) * speed,
                life: 1.0,
                decay: 0.02 + Math.random() * 0.03,
                size: 2 + Math.random() * 4,
                color: color,
            });
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.dx;
            p.y += p.dy;
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function drawParticles() {
        for (const p of particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        }
        ctx.globalAlpha = 1;
    }

    // ============================================================
    //  POWER-UPS (ocasionales)
    // ============================================================
    function maybeSpawnPowerUp(x, y) {
        if (Math.random() < 0.12) {
            const types = ["wide", "multi"];
            const type = types[Math.floor(Math.random() * types.length)];
            powerUps.push({ x: x, y: y, dy: 2, w: 30, h: 14, type: type, color: "#ffffff" });
        }
    }

    function updatePowerUps() {
        for (let i = powerUps.length - 1; i >= 0; i--) {
            const pu = powerUps[i];
            pu.y += pu.dy;

            // Colisión con paleta
            if (pu.x + pu.w > paddle.x && pu.x < paddle.x + paddle.w &&
                pu.y + pu.h > paddle.y && pu.y < paddle.y + paddle.h) {
                applyPowerUp(pu.type);
                powerUps.splice(i, 1);
                continue;
            }

            // Fuera de pantalla
            if (pu.y > H) powerUps.splice(i, 1);
        }
    }

    function drawPowerUps() {
        for (const pu of powerUps) {
            ctx.fillStyle = pu.color;
            ctx.shadowColor = pu.color;
            ctx.shadowBlur = 8;
            ctx.fillRect(pu.x, pu.y, pu.w, pu.h);
            ctx.shadowBlur = 0;

            // Texto indicador
            ctx.fillStyle = "#000";
            ctx.font = "bold 10px Courier New";
            ctx.textAlign = "center";
            const label = pu.type === "wide" ? "W" : "M";
            ctx.fillText(label, pu.x + pu.w / 2, pu.y + 11);
        }
    }

    function applyPowerUp(type) {
        audio.play("powerup");
        if (type === "wide") {
            paddle.w = Math.min(paddle.w + 30, 200);
        } else if (type === "multi") {
            state.score += 50;
        }
    }

    // ============================================================
    //  GAME INIT / RESET
    // ============================================================
    function resetBall() {
        ball.x = paddle.x + paddle.w / 2;
        ball.y = paddle.y - BALL_R - 2;
        ball.dx = 0;
        ball.dy = 0;
        state.ballLaunched = false;
    }

    function launchBall() {
        if (state.ballLaunched) return;
        const angle = -Math.PI / 4 + Math.random() * (-Math.PI / 2 + Math.PI / 4) * 2;
        // Ángulo hacia arriba, aleatorio entre ~30° y ~60° de cada lado
        const dir = Math.random() < 0.5 ? -1 : 1;
        const a = (Math.PI / 6 + Math.random() * Math.PI / 6) * dir;
        ball.dx = Math.sin(a) * ball.speed;
        ball.dy = -Math.cos(a) * ball.speed;
        state.ballLaunched = true;
        audio.play("launch");
    }

    function initGame() {
        state.score = 0;
        state.lives = 3;
        state.level = 1;
        state.running = true;
        state.paused = false;
        state.gameOver = false;
        state.won = false;
        state.combo = 0;

        paddle.x = W / 2 - PADDLE_W / 2;
        paddle.y = H - 35;
        paddle.w = PADDLE_W;

        ball.speed = 5;

        createBricks();
        resetBall();
        particles = [];
        powerUps = [];

        updateHUD();
        overlay.classList.remove("active");
    }

    function nextLevel() {
        state.level++;
        ball.speed += 0.5;
        paddle.w = PADDLE_W; // Reset paddle width
        createBricks();
        resetBall();
        powerUps = [];
        updateHUD();
    }

    // ============================================================
    //  HUD UPDATE
    // ============================================================
    function updateHUD() {
        scoreDisplay.textContent = state.score;
        levelDisplay.textContent = state.level;

        livesDisplay.innerHTML = "";
        for (let i = 0; i < state.lives; i++) {
            const div = document.createElement("div");
            div.className = "life-icon";
            livesDisplay.appendChild(div);
        }
    }

    // ============================================================
    //  COLLISION DETECTION
    // ============================================================
    function rectCollision(bx, by, br, rx, ry, rw, rh) {
        const closestX = Math.max(rx, Math.min(bx, rx + rw));
        const closestY = Math.max(ry, Math.min(by, ry + rh));
        const dx = bx - closestX;
        const dy = by - closestY;
        return (dx * dx + dy * dy) < (br * br);
    }

    // ============================================================
    //  UPDATE LOOP
    // ============================================================
    function update() {
        if (!state.running || state.paused || state.gameOver) return;

        // ---- Paddle movement (keyboard) ----
        const paddleSpeed = 8;
        if (keys["ArrowLeft"] || keys["a"]) {
            paddle.x -= paddleSpeed;
        }
        if (keys["ArrowRight"] || keys["d"]) {
            paddle.x += paddleSpeed;
        }

        // Mouse movement
        paddle.x = mouseX - paddle.w / 2;

        // Clamp paddle
        if (paddle.x < 0) paddle.x = 0;
        if (paddle.x + paddle.w > W) paddle.x = W - paddle.w;

        // ---- Ball on paddle (not launched yet) ----
        if (!state.ballLaunched) {
            ball.x = paddle.x + paddle.w / 2;
            ball.y = paddle.y - BALL_R - 2;
            return;
        }

        // ---- Move ball ----
        ball.x += ball.dx;
        ball.y += ball.dy;

        // ---- Wall collisions ----
        if (ball.x - ball.r <= 0) {
            ball.x = ball.r;
            ball.dx = Math.abs(ball.dx);
            audio.play("wall");
        }
        if (ball.x + ball.r >= W) {
            ball.x = W - ball.r;
            ball.dx = -Math.abs(ball.dx);
            audio.play("wall");
        }
        if (ball.y - ball.r <= 0) {
            ball.y = ball.r;
            ball.dy = Math.abs(ball.dy);
            audio.play("wall");
        }

        // ---- Ball falls below screen ----
        if (ball.y + ball.r > H) {
            state.lives--;
            state.combo = 0;
            audio.play("loseLife");
            updateHUD();

            if (state.lives <= 0) {
                state.gameOver = true;
                showOverlay("GAME OVER", `Score Final: ${state.score}`);
                return;
            }

            resetBall();
            return;
        }

        // ---- Paddle collision ----
        if (rectCollision(ball.x, ball.y, ball.r, paddle.x, paddle.y, paddle.w, paddle.h) &&
            ball.dy > 0) {
            // Calcular ángulo basado en dónde golpea la paleta
            const hitPos = (ball.x - paddle.x) / paddle.w; // 0..1
            const angle = (hitPos - 0.5) * Math.PI * 0.7; // -63° a +63°

            ball.dx = Math.sin(angle) * ball.speed;
            ball.dy = -Math.cos(angle) * ball.speed;
            ball.y = paddle.y - ball.r - 1;

            state.combo = 0;
            audio.play("paddle");
        }

        // ---- Brick collision ----
        for (const brick of bricks) {
            if (!brick.alive) continue;

            if (rectCollision(ball.x, ball.y, ball.r, brick.x, brick.y, brick.w, brick.h)) {
                brick.hp--;

                if (brick.hp <= 0) {
                    brick.alive = false;
                    state.combo++;
                    const comboMultiplier = Math.min(state.combo, 10);
                    state.score += brick.points * comboMultiplier;

                    spawnParticles(
                        brick.x + brick.w / 2,
                        brick.y + brick.h / 2,
                        brick.color,
                        15
                    );
                    maybeSpawnPowerUp(brick.x + brick.w / 2, brick.y + brick.h / 2);
                } else {
                    // Ladrillo aguantó el golpe - partículas pequeñas
                    spawnParticles(
                        ball.x, ball.y,
                        "#ffffff", 5
                    );
                }

                audio.play("brick");

                // Determinar dirección del rebote
                const ballCenterX = ball.x;
                const ballCenterY = ball.y;
                const brickCenterX = brick.x + brick.w / 2;
                const brickCenterY = brick.y + brick.h / 2;

                const overlapX = (brick.w / 2 + ball.r) - Math.abs(ballCenterX - brickCenterX);
                const overlapY = (brick.h / 2 + ball.r) - Math.abs(ballCenterY - brickCenterY);

                if (overlapX < overlapY) {
                    ball.dx = -ball.dx; // Rebote horizontal
                } else {
                    ball.dy = -ball.dy; // Rebote vertical
                }

                updateHUD();
                break; // Solo un ladrico por frame
            }
        }

        // ---- Check win condition ----
        const aliveBricks = bricks.filter(b => b.alive).length;
        if (aliveBricks === 0) {
            audio.play("win");
            if (state.level >= 5) {
                state.won = true;
                showOverlay("🏆 ¡VICTORIA!", `¡Completaste los 5 niveles! Score: ${state.score}`);
            } else {
                nextLevel();
            }
        }

        // ---- Update particles & power-ups ----
        updateParticles();
        updatePowerUps();
    }

    // ============================================================
    //  DRAW LOOP
    // ============================================================
    function draw() {
        ctx.clearRect(0, 0, W, H);

        // ---- Background grid (subtle) ----
        ctx.strokeStyle = "rgba(50, 50, 120, 0.15)";
        ctx.lineWidth = 1;
        for (let x = 0; x < W; x += 40) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
            ctx.stroke();
        }
        for (let y = 0; y < H; y += 40) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
        }

        // ---- Bricks ----
        for (const brick of bricks) {
            if (!brick.alive) continue;

            const alpha = 0.5 + (brick.hp / brick.maxHp) * 0.5;
            ctx.globalAlpha = alpha;

            // Sombra / glow
            ctx.shadowColor = brick.color;
            ctx.shadowBlur = 6;

            // Ladrillo principal
            ctx.fillStyle = brick.color;
            ctx.fillRect(brick.x, brick.y, brick.w, brick.h);

            // Brillo superior (efecto 3D)
            const grad = ctx.createLinearGradient(0, brick.y, 0, brick.y + brick.h);
            grad.addColorStop(0, "rgba(255,255,255,0.35)");
            grad.addColorStop(1, "rgba(0,0,0,0.15)");
            ctx.fillStyle = grad;
            ctx.fillRect(brick.x, brick.y, brick.w, brick.h);

            // Borde
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.lineWidth = 1;
            ctx.strokeRect(brick.x + 0.5, brick.y + 0.5, brick.w - 1, brick.h - 1);

            // Indicador de HP > 1
            if (brick.hp > 1) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = "rgba(255,255,255,0.8)";
                ctx.font = "bold 11px Courier New";
                ctx.textAlign = "center";
                ctx.fillText(brick.hp, brick.x + brick.w / 2, brick.y + brick.h - 4);
            }

            ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1;

        // ---- Paddle ----
        drawPaddle();

        // ---- Ball ----
        drawBall();

        // ---- Power-ups ----
        drawPowerUps();

        // ---- Particles ----
        drawParticles();

        // ---- Combo display ----
        if (state.combo > 1) {
            ctx.fillStyle = "#ffcc00";
            ctx.font = "bold 24px Courier New";
            ctx.textAlign = "center";
            ctx.shadowColor = "#ffcc00";
            ctx.shadowBlur = 15;
            ctx.fillText(`COMBO x${state.combo}`, W / 2, H - 60);
            ctx.shadowBlur = 0;
        }

        // ---- "Press Space" hint ----
        if (!state.ballLaunched && state.running && !state.paused) {
            ctx.fillStyle = "rgba(255,255,255,0.6)";
            ctx.font = "16px Courier New";
            ctx.textAlign = "center";
            const pulse = 0.7 + Math.sin(Date.now() / 300) * 0.3;
            ctx.globalAlpha = pulse;
            ctx.fillText("Presiona ESPACIO para lanzar", W / 2, H - 80);
            ctx.globalAlpha = 1;
        }

        // ---- Pause overlay ----
        if (state.paused) {
            ctx.fillStyle = "rgba(5, 5, 30, 0.7)";
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = "#ffcc00";
            ctx.font = "bold 48px Courier New";
            ctx.textAlign = "center";
            ctx.shadowColor = "#ffcc00";
            ctx.shadowBlur = 20;
            ctx.fillText("PAUSA", W / 2, H / 2);
            ctx.shadowBlur = 0;
        }
    }

    function drawPaddle() {
        const grad = ctx.createLinearGradient(0, paddle.y, 0, paddle.y + paddle.h);
        grad.addColorStop(0, "#66ddff");
        grad.addColorStop(0.5, "#00aaff");
        grad.addColorStop(1, "#0066cc");

        ctx.shadowColor = "#00ccff";
        ctx.shadowBlur = 12;

        // Forma redondeada
        const r = paddle.h / 2;
        ctx.beginPath();
        ctx.moveTo(paddle.x + r, paddle.y);
        ctx.lineTo(paddle.x + paddle.w - r, paddle.y);
        ctx.arc(paddle.x + paddle.w - r, paddle.y + r, r, -Math.PI / 2, Math.PI / 2);
        ctx.lineTo(paddle.x + r, paddle.y);
        ctx.closePath();

        ctx.fillStyle = grad;
        ctx.fill();

        // Brillo
        const shineGrad = ctx.createLinearGradient(0, paddle.y, 0, paddle.y + paddle.h * 0.5);
        shineGrad.addColorStop(0, "rgba(255,255,255,0.4)");
        shineGrad.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = shineGrad;
        ctx.fill();

        ctx.shadowBlur = 0;
    }

    function drawBall() {
        // Glow
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 15;

        const grad = ctx.createRadialGradient(
            ball.x - 2, ball.y - 2, 1,
            ball.x, ball.y, ball.r
        );
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(0.6, "#ffeedd");
        grad.addColorStop(1, "#ff9944");

        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        // Trail (estela)
        if (state.ballLaunched) {
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.arc(ball.x - ball.dx * 1.5, ball.y - ball.dy * 1.5, ball.r * 0.7, 0, Math.PI * 2);
            ctx.fillStyle = "#ff9944";
            ctx.fill();
            ctx.globalAlpha = 0.15;
            ctx.beginPath();
            ctx.arc(ball.x - ball.dx * 3, ball.y - ball.dy * 3, ball.r * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = "#ff6600";
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        ctx.shadowBlur = 0;
    }

    // ============================================================
    //  OVERLAY HELPERS
    // ============================================================
    function showOverlay(title, msg) {
        overlayTitle.textContent = title;
        overlayMsg.textContent = msg;
        overlay.classList.add("active");
    }

    // ============================================================
    //  MAIN LOOP
    // ============================================================
    let lastTime = 0;
    const TARGET_FPS = 60;
    const FRAME_TIME = 1000 / TARGET_FPS;

    function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const elapsed = timestamp - lastTime;

        if (elapsed >= FRAME_TIME) {
            lastTime = timestamp - (elapsed % FRAME_TIME);
            update();
            draw();
        }

        requestAnimationFrame(gameLoop);
    }

    // ============================================================
    //  EVENT LISTENERS
    // ============================================================

    // Keyboard
    document.addEventListener("keydown", (e) => {
        keys[e.key] = true;

        if (e.key === " " || e.key === "Spacebar") {
            e.preventDefault();
            audio.init();
            if (!state.ballLaunched && state.running && !state.paused) {
                launchBall();
            }
        }

        if (e.key === "p" || e.key === "P") {
            togglePause();
        }
    });

    document.addEventListener("keyup", (e) => {
        keys[e.key] = false;
    });

    // Mouse
    canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = W / rect.width;
        mouseX = (e.clientX - rect.left) * scaleX;
    });

    canvas.addEventListener("click", () => {
        audio.init();
        if (!state.ballLaunched && state.running && !state.paused) {
            launchBall();
        }
    });

    // Touch support
    canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = W / rect.width;
        mouseX = (e.touches[0].clientX - rect.left) * scaleX;
    }, { passive: false });

    canvas.addEventListener("touchstart", (e) => {
        audio.init();
        e.preventDefault();
        if (!state.ballLaunched && state.running && !state.paused) {
            launchBall();
        }
    }, { passive: false });

    // Buttons
    restartBtn.addEventListener("click", () => {
        audio.init();
        initGame();
    });

    pauseBtn.addEventListener("click", () => {
        togglePause();
    });

    overlayBtn.addEventListener("click", () => {
        audio.init();
        initGame();
    });

    function togglePause() {
        if (!state.running || state.gameOver) return;
        state.paused = !state.paused;
        pauseBtn.textContent = state.paused ? "▶ Continuar" : "⏸ Pausa";
    }

    // ============================================================
    //  START GAME
    // ============================================================
    initGame();
    requestAnimationFrame(gameLoop);

})();
</script>

</body>
</html>
