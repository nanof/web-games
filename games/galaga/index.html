<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaga - HTML5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .game-wrapper { position: relative; text-align: center; }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: linear-gradient(180deg, #1a1a3e, #0d0d2b);
            border: 2px solid #333;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            color: #fff;
            font-size: 16px;
        }

        .hud span { text-shadow: 0 0 10px currentColor; }
        .score-label { color: #ffcc00; }
        .lives-display { display: flex; gap: 5px; align-items: center; }
        .life-icon {
            width: 18px; height: 14px;
            background: #00ff88;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        }
        .level-display { color: #00ccff; }

        canvas { display: block; border: 2px solid #333; background: #000; }

        .controls-bar {
            display: flex; justify-content: center; gap: 15px;
            padding: 12px 20px;
            background: linear-gradient(180deg, #0d0d2b, #1a1a3e);
            border: 2px solid #333;
            border-top: none;
            border-radius: 0 0 10px 10px;
        }

        .btn {
            padding: 8px 24px; font-family: 'Courier New', monospace;
            font-size: 14px; font-weight: bold;
            border: 2px solid #ffcc00; background: transparent;
            color: #ffcc00; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.3s;
        }

        .btn:hover {
            background: #ffcc00; color: #000;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
        }

        .instructions {
            color: #666; font-size: 11px; margin-top: 8px; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="hud">
            <span class="score-label">SCORE: <span id="scoreDisplay">0</span></span>
            <span class="level-display">WAVE: <span id="waveDisplay">1</span></span>
            <div class="lives-display">LIVES: <span id="livesContainer"></span></div>
        </div>
        <canvas id="gameCanvas" width="480" height="640"></canvas>
        <div class="controls-bar">
            <button class="btn" id="restartBtn">Reiniciar</button>
            <span class="instructions">← → MOVER &nbsp;|&nbsp; ESPACIO DISPARAR</span>
        </div>
    </div>

<script>
// ============================================================
//  GALAGA - HTML5 Canvas Game
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ---- Audio Engine (Web Audio API) ----
let audioCtx = null;

function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    ensureAudio();
    const now = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);

    switch (type) {
        case 'shoot': {
            const o = audioCtx.createOscillator();
            o.type = 'square';
            o.frequency.setValueAtTime(880, now);
            o.frequency.exponentialRampToValueAtTime(440, now + 0.1);
            g.gain.setValueAtTime(0.15, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            o.connect(g); o.start(now); o.stop(now + 0.1);
            break;
        }
        case 'explosion': {
            const bufferSize = audioCtx.sampleRate * 0.3;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++)
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
            const src = audioCtx.createBufferSource();
            src.buffer = buffer;
            g.gain.setValueAtTime(0.3, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            src.connect(g); src.start(now);
            break;
        }
        case 'playerHit': {
            const o = audioCtx.createOscillator();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(200, now);
            o.frequency.exponentialRampToValueAtTime(50, now + 0.5);
            g.gain.setValueAtTime(0.3, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            o.connect(g); o.start(now); o.stop(now + 0.5);
            break;
        }
        case 'enemyShoot': {
            const o = audioCtx.createOscillator();
            o.type = 'triangle';
            o.frequency.setValueAtTime(300, now);
            o.frequency.exponentialRampToValueAtTime(150, now + 0.15);
            g.gain.setValueAtTime(0.1, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            o.connect(g); o.start(now); o.stop(now + 0.15);
            break;
        }
        case 'powerup': {
            const o = audioCtx.createOscillator();
            o.type = 'sine';
            o.frequency.setValueAtTime(523, now);
            o.frequency.setValueAtTime(659, now + 0.1);
            o.frequency.setValueAtTime(784, now + 0.2);
            g.gain.setValueAtTime(0.2, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
            o.connect(g); o.start(now); o.stop(now + 0.35);
            break;
        }
        case 'waveStart': {
            const o = audioCtx.createOscillator();
            o.type = 'square';
            o.frequency.setValueAtTime(261, now);
            o.frequency.setValueAtTime(329, now + 0.15);
            o.frequency.setValueAtTime(392, now + 0.3);
            o.frequency.setValueAtTime(523, now + 0.45);
            g.gain.setValueAtTime(0.15, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
            o.connect(g); o.start(now); o.stop(now + 0.6);
            break;
        }
    }
}

// ---- Game State ----
let game = { score: 0, lives: 3, wave: 1, state: 'waitingWave', shakeTimer: 0, shakeIntensity: 0 };

// ---- Stars Background ----
const stars = [];
for (let i = 0; i < 120; i++) {
    stars.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 2 + 0.5, speed: Math.random() * 0.5 + 0.1 });
}

// ---- Player ----
let player = { x: W / 2, y: H - 60, width: 30, height: 24, speed: 5, shootCooldown: 0, invincibleTimer: 0, alive: true };

// ---- Input ----
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; if (['Space','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ---- Game Objects ----
let playerBullets = [];
let enemyBullets = [];
let enemies = [];
let particles = [];
let powerups = [];

const ENEMY_TYPES = {
    BEE:       { points: 50,  hp: 1 },
    BUTTERFLY: { points: 100, hp: 1 },
    BOSS:      { points: 150, hp: 2 },
    COMMANDER: { points: 300, hp: 3 }
};

let formationOffsetX = 0;
let formationDir = 1;
let formationSpeed = 0.5;
let diveTimer = 0;
let waveTransitionTimer = 0; // <-- BUG FIX: was never initialized!

// ============================================================
//  DRAWING FUNCTIONS
// ============================================================

function drawPlayerShip(x, y) {
    ctx.save();
    if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer * 10) % 2 === 0) ctx.globalAlpha = 0.4;

    // Main body
    ctx.fillStyle = '#00ff88';
    ctx.beginPath();
    ctx.moveTo(x, y - 14);
    ctx.lineTo(x + 6, y - 2);
    ctx.lineTo(x + 15, y + 10);
    ctx.lineTo(x + 6, y + 6);
    ctx.lineTo(x + 3, y + 12);
    ctx.lineTo(x - 3, y + 12);
    ctx.lineTo(x - 6, y + 6);
    ctx.lineTo(x - 15, y + 10);
    ctx.lineTo(x - 6, y - 2);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#88ffcc';
    ctx.beginPath();
    ctx.moveTo(x, y - 10);
    ctx.lineTo(x + 3, y - 2);
    ctx.lineTo(x - 3, y - 2);
    ctx.closePath();
    ctx.fill();

    // Engine glow
    const flicker = Math.random() * 4;
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(x - 5, y + 10, 3, 4 + flicker);
    ctx.fillRect(x + 2, y + 10, 3, 4 + flicker);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(x - 1.5, y + 10, 3, 6 + flicker * 0.7);

    ctx.restore();
}

function drawBeeEnemy(x, y, frame) {
    const wobble = Math.sin(frame * 0.2) * 2;
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2); ctx.fill();

    const wingAngle = Math.sin(frame * 0.5) * 0.4;
    ctx.fillStyle = '#ffee66';
    ctx.save(); ctx.translate(x - 10, y + wobble); ctx.rotate(wingAngle - 0.3);
    ctx.fillRect(-8, -3, 12, 6); ctx.restore();
    ctx.save(); ctx.translate(x + 10, y + wobble); ctx.rotate(-wingAngle + 0.3);
    ctx.fillRect(-4, -3, 12, 6); ctx.restore();

    ctx.fillStyle = '#ff0000';
    ctx.fillRect(x - 4, y - 3, 3, 3);
    ctx.fillRect(x + 1, y - 3, 3, 3);
    ctx.fillStyle = '#cc8800';
    ctx.fillRect(x - 6, y + 2, 12, 2);
}

function drawButterflyEnemy(x, y, frame) {
    const wobble = Math.sin(frame * 0.15) * 3;
    const wingFlap = Math.sin(frame * 0.4) * 8;
    ctx.fillStyle = '#ff4466';
    ctx.beginPath(); ctx.moveTo(x, y);
    ctx.quadraticCurveTo(x - 12 - wingFlap, y - 10 + wobble, x - 8, y + 5 + wobble);
    ctx.lineTo(x, y); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x, y);
    ctx.quadraticCurveTo(x + 12 + wingFlap, y - 10 + wobble, x + 8, y + 5 + wobble);
    ctx.lineTo(x, y); ctx.fill();

    ctx.fillStyle = '#cc2244';
    ctx.fillRect(x - 2, y - 6, 4, 14);
    ctx.fillStyle = '#ff8899';
    ctx.beginPath(); ctx.arc(x - 7 - wingFlap * 0.5, y - 3 + wobble, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 7 + wingFlap * 0.5, y - 3 + wobble, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 3, y - 6, 2, 2);
    ctx.fillRect(x + 1, y - 6, 2, 2);
}

function drawBossEnemy(x, y, frame) {
    const wobble = Math.sin(frame * 0.1) * 2;
    ctx.fillStyle = '#aa44ff';
    ctx.beginPath();
    ctx.moveTo(x, y - 12); ctx.lineTo(x + 12, y - 4); ctx.lineTo(x + 14, y + 6);
    ctx.lineTo(x + 8, y + 12); ctx.lineTo(x - 8, y + 12); ctx.lineTo(x - 14, y + 6);
    ctx.lineTo(x - 12, y - 4); ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#7722cc';
    ctx.beginPath();
    ctx.moveTo(x, y - 8); ctx.lineTo(x + 7, y - 2); ctx.lineTo(x + 8, y + 4);
    ctx.lineTo(x - 8, y + 4); ctx.lineTo(x - 7, y - 2); ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#cc66ff';
    ctx.fillRect(x - 10, y - 14, 3, 5);
    ctx.fillRect(x + 7, y - 14, 3, 5);
    ctx.fillRect(x - 1.5, y - 16, 3, 7);

    ctx.fillStyle = '#ff0000';
    ctx.fillRect(x - 5, y - 2, 4, 4);
    ctx.fillRect(x + 1, y - 2, 4, 4);
    ctx.fillStyle = '#ff6666';
    ctx.fillRect(x - 4, y - 1, 2, 2);
    ctx.fillRect(x + 2, y - 1, 2, 2);
}

function drawCommanderEnemy(x, y, frame) {
    const wobble = Math.sin(frame * 0.08) * 3;
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(x, y - 14); ctx.lineTo(x + 14, y - 2); ctx.lineTo(x + 16, y + 8);
    ctx.lineTo(x + 10, y + 14); ctx.lineTo(x - 10, y + 14); ctx.lineTo(x - 16, y + 8);
    ctx.lineTo(x - 14, y - 2); ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#cc3300';
    ctx.beginPath();
    ctx.moveTo(x, y - 9); ctx.lineTo(x + 8, y - 1); ctx.lineTo(x + 9, y + 5);
    ctx.lineTo(x - 9, y + 5); ctx.lineTo(x - 8, y - 1); ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#ff8833';
    ctx.beginPath(); ctx.moveTo(x - 12, y - 6); ctx.lineTo(x - 18, y - 18 + wobble); ctx.lineTo(x - 8, y - 4); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 12, y - 6); ctx.lineTo(x + 18, y - 18 + wobble); ctx.lineTo(x + 8, y - 4); ctx.fill();

    ctx.fillStyle = '#ffff00';
    ctx.fillRect(x - 5, y - 3, 4, 4);
    ctx.fillRect(x + 1, y - 3, 4, 4);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(x - 4, y - 2, 2, 2);
    ctx.fillRect(x + 2, y - 2, 2, 2);

    if (ENEMY_TYPES.COMMANDER.hp > 1) {
        ctx.fillStyle = '#ffcc00';
        for (let i = 0; i < ENEMY_TYPES.COMMANDER.hp; i++)
            ctx.fillRect(x - 6 + i * 4, y + 10, 2, 2);
    }
}

function drawEnemy(enemy) {
    const frame = enemy.frame || 0;
    switch (enemy.type) {
        case 'BEE':       drawBeeEnemy(enemy.x, enemy.y, frame); break;
        case 'BUTTERFLY': drawButterflyEnemy(enemy.x, enemy.y, frame); break;
        case 'BOSS':      drawBossEnemy(enemy.x, enemy.y, frame); break;
        case 'COMMANDER': drawCommanderEnemy(enemy.x, enemy.y, frame); break;
    }
    if (enemy.hp > 1) {
        ctx.fillStyle = '#ff0';
        for (let i = 0; i < enemy.hp - 1; i++)
            ctx.fillRect(enemy.x - 4 + i * 3, enemy.y + 14, 2, 2);
    }
}

function drawBullet(bx, by, color) {
    ctx.fillStyle = color || '#ffffff';
    ctx.shadowColor = color || '#ffffff';
    ctx.shadowBlur = 6;
    ctx.fillRect(bx - 1.5, by - 4, 3, 8);
    ctx.shadowBlur = 0;
}

function drawEnemyBullet(bx, by) {
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffaaaa';
    ctx.beginPath(); ctx.arc(bx, by, 1.5, 0, Math.PI * 2); ctx.fill();
}

function drawParticle(p) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    const s = p.size * p.alpha;
    ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
    ctx.globalAlpha = 1;
}

function drawPowerup(p) {
    const pulse = Math.sin(Date.now() * 0.01) * 0.2 + 0.8;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(pulse, pulse);
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#00ccff';
    ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(6, 4); ctx.lineTo(-6, 4); ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
}

// ============================================================
//  GAME LOGIC
// ============================================================

function createExplosion(x, y, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            size: Math.random() * 4 + 2, alpha: 1,
            color: `hsl(${Math.random() * 60 + 10}, 100%, ${50 + Math.random() * 30}%)`,
            life: Math.random() * 0.6 + 0.4
        });
    }
}

function spawnWave(waveNum) {
    enemies = [];
    enemyBullets = [];
    formationOffsetX = 0;
    formationDir = 1;
    formationSpeed = 0.5 + waveNum * 0.1;
    diveTimer = 0;

    const rows = Math.min(4, 2 + Math.floor(waveNum / 3));
    const cols = Math.min(8, 6 + Math.floor(waveNum / 2));

    for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
            let type;
            if (row === 0) type = 'COMMANDER';
            else if (row === 1) type = waveNum > 2 ? 'BOSS' : 'BUTTERFLY';
            else if (row === 2) type = 'BUTTERFLY';
            else type = 'BEE';

            const baseX = 60 + col * 48;
            const baseY = 50 + row * 40;

            enemies.push({
                x: baseX, y: baseY - 200,
                targetX: baseX, targetY: baseY,
                type: type,
                hp: ENEMY_TYPES[type].hp, maxHp: ENEMY_TYPES[type].hp,
                points: ENEMY_TYPES[type].points,
                state: 'entering',   // <-- BUG FIX: this state was never handled in update()!
                frame: Math.random() * 100,
                diveSpeed: 2 + waveNum * 0.3,
                shootTimer: Math.random() * 200 + 100,
                alive: true,
                enterProgress: 0
            });
        }
    }

    game.state = 'playing';
    playSound('waveStart');
}

function resetPlayer() {
    player.x = W / 2;
    player.y = H - 60;
    player.alive = true;
    player.invincibleTimer = 3;
    player.shootCooldown = 0;
}

// ---- BUG FIX: waveTransitionTimer is now initialized here ----
function initGame() {
    game.score = 0;
    game.lives = 3;
    game.wave = 1;
    game.state = 'waitingWave';
    game.shakeTimer = 0;
    game.shakeIntensity = 0;
    playerBullets = [];
    enemyBullets = [];
    particles = [];
    powerups = [];
    enemies = [];
    resetPlayer();
    updateHUD();

    // BUG FIX: initialize the timer so the wave actually spawns after delay
    waveTransitionTimer = 2;

    setTimeout(() => { spawnWave(1); }, 1500);
}

function updateHUD() {
    document.getElementById('scoreDisplay').textContent = game.score;
    document.getElementById('waveDisplay').textContent = game.wave;
    const container = document.getElementById('livesContainer');
    container.innerHTML = '';
    for (let i = 0; i < game.lives; i++) {
        const div = document.createElement('div');
        div.className = 'life-icon';
        container.appendChild(div);
    }
}

function shootPlayerBullet() {
    if (player.shootCooldown > 0 || !player.alive) return;
    playerBullets.push({ x: player.x, y: player.y - 16, speed: 8 });
    player.shootCooldown = 0.25;
    playSound('shoot');
}

function shootEnemyBullet(enemy) {
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist === 0) return;
    const speed = 3 + game.wave * 0.2;
    enemyBullets.push({ x: enemy.x, y: enemy.y + 10, vx: (dx / dist) * speed, vy: (dy / dist) * speed });
    playSound('enemyShoot');
}

function checkCollision(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax - aw / 2 < bx + bw / 2 && ax + aw / 2 > bx - bw / 2 &&
           ay - ah / 2 < by + bh / 2 && ay + ah / 2 > by - bh / 2;
}

// ---- Update ----
let lastTime = performance.now();

function update(dt) {
    // BUG FIX: handle waitingWave state properly with initialized timer
    if (game.state === 'waitingWave') {
        waveTransitionTimer -= dt;
        if (waveTransitionTimer <= 0) spawnWave(game.wave);
        updateStars(dt);
        updateParticles(dt);
        return;
    }

    if (game.state === 'gameOver') {
        updateStars(dt);
        updateParticles(dt);
        return;
    }

    // Screen shake decay
    if (game.shakeTimer > 0) game.shakeTimer -= dt;

    // ---- Player movement ----
    if (player.alive) {
        if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed * 60 * dt;
        if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed * 60 * dt;
        player.x = Math.max(20, Math.min(W - 20, player.x));

        if (player.shootCooldown > 0) player.shootCooldown -= dt;
        if (keys['Space']) shootPlayerBullet();
        if (player.invincibleTimer > 0) player.invincibleTimer -= dt;
    }

    // ---- Player bullets ----
    for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        b.y -= b.speed * 60 * dt;
        if (b.y < -10) { playerBullets.splice(i, 1); continue; }

        let hit = false;
        for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (!e.alive) continue;
            if (checkCollision(b.x, b.y, 4, 8, e.x, e.y, 20, 24)) {
                e.hp--;
                if (e.hp <= 0) {
                    e.alive = false;
                    game.score += e.points * (game.wave > 5 ? 2 : 1);
                    if (Math.random() < 0.08) powerups.push({ x: e.x, y: e.y, vy: 1.5 });
                    createExplosion(e.x, e.y, 20);
                    playSound('explosion');
                } else {
                    createExplosion(b.x, b.y, 5);
                    playSound('shoot');
                }
                playerBullets.splice(i, 1);
                hit = true;
                updateHUD();
                break;
            }
        }
    }

    // ---- Enemy formation movement ----
    const anyFormation = enemies.some(e => e.alive && e.state === 'formation');
    if (anyFormation) {
        formationOffsetX += formationDir * formationSpeed * 60 * dt;
        if (Math.abs(formationOffsetX) > 40) formationDir *= -1;

        enemies.forEach(e => {
            if (!e.alive || e.state !== 'formation') return;
            e.x = e.targetX + formationOffsetX;
            e.y = e.targetY + Math.sin(Date.now() * 0.002 + e.targetX) * 3;

            // Shooting
            e.shootTimer -= dt * 60;
            if (e.shootTimer <= 0 && player.alive) {
                shootEnemyBullet(e);
                e.shootTimer = Math.random() * 150 + 80 - game.wave * 5;
                if (e.shootTimer < 30) e.shootTimer = 30;
            }
        });

        // Random dive attacks
        diveTimer -= dt;
        if (diveTimer <= 0) {
            const aliveEnemies = enemies.filter(e => e.alive && e.state === 'formation');
            if (aliveEnemies.length > 0) {
                const diver = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
                diver.state = 'diving';
                diveTimer = Math.max(1, 4 - game.wave * 0.2);
            }
        }
    }

    // ---- BUG FIX: Unified enemy update that handles ALL states (entering, diving, formation) ----
    enemies.forEach(e => {
        if (!e.alive) return;

        e.frame += dt * 60;

        // Handle 'entering' state - enemies coming from off-screen top into formation
        if (e.state === 'entering') {
            const targetY = e.targetY + Math.sin(Date.now() * 0.002 + e.targetX) * 3;
            e.y += e.diveSpeed * 40 * dt; // Move down toward formation
            e.x = e.targetX + formationOffsetX + Math.sin(e.y * 0.015) * 20;

            if (e.y >= targetY - 10) {
                e.state = 'formation';
                e.enterProgress = 1;
            }
        }

        // Handle 'diving' state - enemies attacking the player
        if (e.state === 'diving') {
            const dx = player.x - e.x;
            const dy = player.y - e.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 0) {
                e.x += (dx / dist) * e.diveSpeed * 60 * dt;
                e.y += (dy / dist) * e.diveSpeed * 60 * dt;
            }

            // Shooting while diving
            e.shootTimer -= dt * 60;
            if (e.shootTimer <= 0 && player.alive) {
                shootEnemyBullet(e);
                e.shootTimer = Math.random() * 80 + 40;
            }

            // Return to formation after passing player or going off-screen
            if (e.y > H + 30 || e.x < -50 || e.x > W + 50) {
                e.state = 'entering';
                e.enterProgress = 0;
                e.y = -20;
                e.x = e.targetX + formationOffsetX;
            }

            // Collision with player
            if (player.alive && checkCollision(e.x, e.y, 18, 24, player.x, player.y, 26, 24)) {
                hitPlayer();
                e.alive = false;
                createExplosion(e.x, e.y, 25);
                playSound('explosion');
            }
        }

        // Handle 'formation' state - already handled above in the formation block
    });

    // ---- Enemy bullets ----
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx * 60 * dt;
        b.y += b.vy * 60 * dt;

        if (b.y > H + 20 || b.y < -20 || b.x < -20 || b.x > W + 20) {
            enemyBullets.splice(i, 1); continue;
        }

        if (player.alive && player.invincibleTimer <= 0) {
            if (checkCollision(b.x, b.y, 6, 6, player.x, player.y, 26, 24)) {
                hitPlayer();
                enemyBullets.splice(i, 1); continue;
            }
        }
    }

    // ---- Powerups ----
    for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y += p.vy * 60 * dt;
        if (p.y > H + 20) { powerups.splice(i, 1); continue; }

        if (player.alive && checkCollision(p.x, p.y, 14, 14, player.x, player.y, 30, 28)) {
            game.score += 500;
            createExplosion(p.x, p.y, 15);
            playSound('powerup');
            powerups.splice(i, 1);
            updateHUD();
        }
    }

    // ---- Particles & Stars ----
    updateParticles(dt);
    updateStars(dt);

    // ---- Check wave clear ----
    if (game.state === 'playing' && enemies.every(e => !e.alive)) {
        game.wave++;
        game.state = 'waitingWave';
        waveTransitionTimer = 2;
        playerBullets = [];
        enemyBullets = [];
        updateHUD();
    }

    // ---- Check lives ----
    if (game.lives <= 0 && game.state === 'playing') {
        game.state = 'gameOver';
    }
}

function hitPlayer() {
    player.alive = false;
    game.lives--;
    createExplosion(player.x, player.y, 40);
    playSound('playerHit');
    game.shakeTimer = 0.3;
    game.shakeIntensity = 8;
    updateHUD();

    setTimeout(() => {
        if (game.lives > 0) resetPlayer();
    }, 1500);
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * 60 * dt;
        p.y += p.vy * 60 * dt;
        p.life -= dt;
        p.alpha = Math.max(0, p.life / 0.5);
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function updateStars(dt) {
    stars.forEach(s => {
        s.y += s.speed * 60 * dt;
        if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    });
}

// ---- Draw ----
function draw() {
    ctx.save();

    // Screen shake
    if (game.shakeTimer > 0) {
        const sx = (Math.random() - 0.5) * game.shakeIntensity * (game.shakeTimer / 0.3);
        const sy = (Math.random() - 0.5) * game.shakeIntensity * (game.shakeTimer / 0.3);
        ctx.translate(sx, sy);
    }

    // Clear
    ctx.fillStyle = '#000';
    ctx.fillRect(-10, -10, W + 20, H + 20);

    // Stars
    stars.forEach(s => {
        const alpha = 0.4 + Math.sin(Date.now() * 0.003 + s.x) * 0.3;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.size), Math.ceil(s.size));
    });
    ctx.globalAlpha = 1;

    // Player bullets
    playerBullets.forEach(b => drawBullet(b.x, b.y, '#00ffff'));

    // Enemy bullets
    enemyBullets.forEach(b => drawEnemyBullet(b.x, b.y));

    // Enemies
    enemies.forEach(e => { if (e.alive) drawEnemy(e); });

    // Player
    if (player.alive && player.invincibleTimer <= 0 || (player.alive && Math.floor(player.invincibleTimer * 10) % 2 === 0)) {
        if (player.alive) drawPlayerShip(player.x, player.y);
    }

    // Powerups
    powerups.forEach(p => drawPowerup(p));

    // Particles
    particles.forEach(p => drawParticle(p));

    // Wave transition text
    if (game.state === 'waitingWave') {
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 28px Courier New';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#ffcc00';
        ctx.shadowBlur = 15;
        ctx.fillText(`WAVE ${game.wave}`, W / 2, H / 2);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#888';
        ctx.font = '14px Courier New';
        ctx.fillText('Get ready...', W / 2, H / 2 + 30);
    }

    // Game over
    if (game.state === 'gameOver') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 36px Courier New';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#ff4444';
        ctx.shadowBlur = 20;
        ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#ffffff';
        ctx.font = '18px Courier New';
        ctx.fillText(`Final Score: ${game.score}`, W / 2, H / 2 + 20);

        ctx.fillStyle = '#ffcc00';
        ctx.font = '14px Courier New';
        ctx.fillText('Press REINICIAR to play again', W / 2, H / 2 + 55);
    }

    ctx.restore();
}

// ---- Game Loop ----
function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}

// ---- Restart Button ----
document.getElementById('restartBtn').addEventListener('click', () => {
    ensureAudio();
    initGame();
});

// ---- Start ----
initGame();
requestAnimationFrame(gameLoop);
</script>
