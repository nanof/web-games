<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      color: #e8eaef;
      font-family: system-ui, sans-serif;
      gap: 1rem;
    }
    canvas {
      border: 2px solid #6c9eff;
      border-radius: 8px;
      background: #1a1d27;
      max-width: 100%;
    }
    a {
      color: #6c9eff;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    p { color: #9aa3b8; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Juego Demo</h1>
  <canvas id="game" width="480" height="320" aria-label="Cuadrado que rebota"></canvas>
  <p>Usa las flechas ← → para mover el cuadrado</p>
  <a href="../../index.html">← Volver al portal</a>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const player = { x: 200, y: 140, size: 40, speed: 5, color: "#6c9eff" };
    const keys = {};

    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(e.key)) {
        e.preventDefault();
      }
    });
    document.addEventListener("keyup", (e) => { keys[e.key] = false; });

    function update() {
      if (keys["ArrowLeft"] || keys["a"]) player.x -= player.speed;
      if (keys["ArrowRight"] || keys["d"]) player.x += player.speed;
      if (keys["ArrowUp"] || keys["w"]) player.y -= player.speed;
      if (keys["ArrowDown"] || keys["s"]) player.y += player.speed;

      player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
      player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));
    }

    function draw() {
      ctx.fillStyle = "#1a1d27";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y, player.size, player.size);

      ctx.fillStyle = "#9aa3b8";
      ctx.font = "14px system-ui, sans-serif";
      ctx.fillText("Demo HTML5", 12, 24);
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
